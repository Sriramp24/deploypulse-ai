<!DOCTYPE html>
<html>

<head>

    <title>DeployPulse AI/ Auto CI/CD</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="sidebar">

    <h2>DeployPulse AI</h2>

    <ul>

        <li onclick="showPage('dashboard')">Dashboard</li>

        <li onclick="showPage('containers')">Containers</li>

        <li onclick="showPage('jenkins')">Jenkins</li>

        <li onclick="showPage('logs')">Logs</li>

        <li>
            <a href="http://localhost:3001"
               target="_blank"
               style="color:white;text-decoration:none;">
               Grafana Dashboard
            </a>
        </li>

    </ul>

</div>

<div class="main">

    <div id="dashboard" class="page">

        <h1>DeployPulse AI Dashboard</h1>

        <div class="cards">

            <div class="card" id="cpu">
                Loading CPU...
            </div>

            <div class="card" id="ram">
                Loading RAM...
            </div>

            <div class="card" id="disk">
                Loading Disk...
            </div>

        </div>

    </div>

    <div id="containers"
         class="page"
         style="display:none;">

        <h1>Docker Containers</h1>

        <div class="cards" id="containerList">

        </div>

    </div>

    <div id="jenkins"
         class="page"
         style="display:none;">

        <h1>Jenkins Builds</h1>

        <div class="cards" id="jenkinsBuilds">

        </div>

    </div>

    <div id="logs"
         class="page"
         style="display:none;">

        <h1>Live Logs</h1>

        <div class="logs" id="liveLogs">

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>

</html>
