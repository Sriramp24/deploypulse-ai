services:

  backend:
    build: ./backend
    container_name: deploypulse-backend
    ports:
      - "3000:3000"
    privileged: true
    user: root
    volumes:
      - ./data:/app/data
  frontend:
    image: nginx
    container_name: deploypulse-frontend
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3001:3000"

  node-exporter:
    image: prom/node-exporter
    container_name: node-exporter
    ports:
      - "9100:9100"
